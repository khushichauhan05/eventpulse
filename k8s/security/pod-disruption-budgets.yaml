---
# Pod Disruption Budgets (PDB)
# Ensure minimum pod availability during voluntary disruptions (node drain, pod eviction, etc.)

# API Gateway PDB
# Ensures at least 1 pod stays running during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: eventpulse
  labels:
    app: api-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway

---
# Analytics Service PDB
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: analytics-service-pdb
  namespace: eventpulse
  labels:
    app: analytics-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: analytics-service

