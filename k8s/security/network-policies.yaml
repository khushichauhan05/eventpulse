---
# NetworkPolicies for EventPulse (Optional)
# These are recommended for production clusters with CNI support (Calico, Cilium, etc.)
# Not required for basic security hardening.
#
# Apply ONLY if your cluster CNI supports NetworkPolicy.
# Test in non-production first.

# Default Deny All Ingress
# Deny all traffic by default, then explicitly allow required connections
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-deny-all-ingress
  namespace: eventpulse
spec:
  podSelector: {}  # All pods in namespace
  policyTypes:
  - Ingress

---
# Allow Prometheus to scrape all services
# Prometheus needs to reach /metrics endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-allow-prometheus-scrape
  namespace: eventpulse
spec:
  podSelector: {}  # All pods
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8080  # API Gateway metrics
    - protocol: TCP
      port: 8081  # Analytics Service metrics
    - protocol: TCP
      port: 8082  # Alert Service metrics
    - protocol: TCP
      port: 9090  # Prometheus self-metrics
    - protocol: TCP
      port: 5432  # PostgreSQL (if Prometheus scrapes DB)

---
# Allow API Gateway ingress from NGINX Ingress Controller
# External traffic enters through NGINX, then routes to API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-allow-api-gateway-from-ingress
  namespace: eventpulse
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx  # NGINX Ingress namespace
    - podSelector:
        matchLabels:
          app: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080

---
# Allow Analytics Service to access Kafka & PostgreSQL
# Analytics reads from Kafka, can read DB if needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-allow-analytics-service-egress
  namespace: eventpulse
spec:
  podSelector:
    matchLabels:
      app: analytics-service
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092  # Kafka client port
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL (if needed)
  # Allow DNS (for service discovery)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53

---
# Allow Alert Service to access Kafka & PostgreSQL
# Alert reads from Kafka, writes to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-allow-alert-service-egress
  namespace: eventpulse
spec:
  podSelector:
    matchLabels:
      app: alert-service
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092  # Kafka
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53

---
# Allow PostgreSQL from Alert Service & Analytics Service
# These services read/write to database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-allow-postgres-from-services
  namespace: eventpulse
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: alert-service
    - podSelector:
        matchLabels:
          app: analytics-service
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 5432

---
# Allow Kafka from all services
# Event pipeline requires all services to access Kafka
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eventpulse-allow-kafka-from-services
  namespace: eventpulse
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    - podSelector:
        matchLabels:
          app: analytics-service
    - podSelector:
        matchLabels:
          app: alert-service
    ports:
    - protocol: TCP
      port: 9092  # Client
    - protocol: TCP
      port: 9093  # Controller (broker-to-broker)

---
# Deny NGINX Ingress egress (except to API Gateway & external)
# Prevent compromised NGINX from accessing other services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-nginx-deny-egress
  namespace: ingress-nginx
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow external DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow external traffic (client requests)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  # Allow access to EventPulse API Gateway only
  - to:
    - namespaceSelector:
        matchLabels:
          name: eventpulse
      podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8080
