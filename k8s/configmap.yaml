---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eventpulse-config
  namespace: eventpulse
data:
  # Kafka configuration
  KAFKA_BROKERS: "kafka-0.kafka-headless.eventpulse.svc.cluster.local:9092,kafka-1.kafka-headless.eventpulse.svc.cluster.local:9092,kafka-2.kafka-headless.eventpulse.svc.cluster.local:9092"
  KAFKA_TOPIC_RAW: "events.raw"
  KAFKA_TOPIC_PROCESSED: "events.processed"
  KAFKA_TOPIC_ALERTS: "alerts"
  KAFKA_TOPIC_DLQ: "events.dlq"

  # Consumer groups
  KAFKA_ANALYTICS_GROUP: "analytics-group"
  KAFKA_ALERT_GROUP: "alert-group"

  # Logging
  LOG_LEVEL: "INFO"

  # API Gateway
  API_PORT: "8080"
  API_SERVICE_NAME: "api-gateway"

  # Analytics Service
  ANALYTICS_PORT: "8080"
  ANALYTICS_HEALTH_PORT: "8081"
  ANALYTICS_SERVICE_NAME: "analytics-service"

  # Alert Service
  ALERT_PORT: "8080"
  ALERT_HEALTH_PORT: "8082"
  ALERT_SERVICE_NAME: "alert-service"

  # PostgreSQL connection settings (host and port only; credentials in Secret)
  POSTGRES_HOST: "postgres.eventpulse.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "eventpulse"
  POSTGRES_USER: "admin"
