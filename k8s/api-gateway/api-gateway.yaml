---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: eventpulse
  labels:
    app: api-gateway
    tier: services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: services
    spec:
      containers:
      - name: api-gateway
        image: eventpulse-api-gateway:latest
        imagePullPolicy: Never  # Change to IfNotPresent for production with registry
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8080
          name: metrics
          protocol: TCP
        env:
        - name: SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: API_SERVICE_NAME
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: API_PORT
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: KAFKA_BROKERS
        - name: KAFKA_TOPIC_RAW
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: KAFKA_TOPIC_RAW
        - name: KAFKA_TOPIC_PROCESSED
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: KAFKA_TOPIC_PROCESSED
        - name: KAFKA_TOPIC_ALERTS
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: KAFKA_TOPIC_ALERTS
        - name: KAFKA_TOPIC_DLQ
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: KAFKA_TOPIC_DLQ
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: eventpulse-config
              key: LOG_LEVEL
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: eventpulse-secrets
              key: DATABASE_DSN
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: eventpulse
  labels:
    app: api-gateway
    tier: services
spec:
  selector:
    app: api-gateway
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
