---
# IMPORTANT: This is a template. Secrets should be managed via:
# - CI/CD secrets (GitHub Actions)
# - External secret management (Sealed Secrets, HashiCorp Vault, AWS Secrets Manager)
# - kubectl create secret (development only)
#
# DO NOT commit actual secrets to this repository.
#
# Example to create from CLI:
# kubectl create secret generic eventpulse-secrets \
#   --from-literal=POSTGRES_PASSWORD='your-secure-password' \
#   --from-literal=GRAFANA_PASSWORD='your-grafana-password' \
#   -n eventpulse
#
# Or use a .env file:
# kubectl create secret generic eventpulse-secrets \
#   --from-env-file=.env.secrets \
#   -n eventpulse

apiVersion: v1
kind: Secret
metadata:
  name: eventpulse-secrets
  namespace: eventpulse
type: Opaque
stringData:
  # PostgreSQL password
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # PostgreSQL full DSN for Go application
  DATABASE_DSN: "host=postgres.eventpulse.svc.cluster.local port=5432 user=admin password=CHANGE_ME_IN_PRODUCTION dbname=eventpulse sslmode=disable"

  # Grafana admin password
  GRAFANA_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
