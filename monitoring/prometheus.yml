global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:8081"]

  - job_name: alert-service
    static_configs:
      - targets: ["alert-service:8082"]
