<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">EventPulse Architecture Screenshot</title>
  <desc id="desc">A visual summary of the EventPulse pipeline from API Gateway to Kafka, analytics, alerting, and PostgreSQL.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #cbd5e1; }
      .box { fill: url(#card); stroke: #334155; stroke-width: 2; rx: 18; }
      .label { font: 700 22px Arial, sans-serif; fill: #e2e8f0; }
      .small { font: 400 15px Arial, sans-serif; fill: #94a3b8; }
      .arrow { stroke: #38bdf8; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .topic { font: 700 14px Arial, sans-serif; fill: #7dd3fc; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="60" y="64" class="title">EventPulse Architecture</text>
  <text x="60" y="94" class="subtitle">API Gateway → Kafka → Analytics → Kafka → Alert Service → PostgreSQL</text>

  <rect x="60" y="170" width="180" height="100" class="box"/>
  <text x="150" y="210" text-anchor="middle" class="label">API Gateway</text>
  <text x="150" y="236" text-anchor="middle" class="small">POST /events</text>

  <rect x="280" y="170" width="180" height="100" class="box"/>
  <text x="370" y="210" text-anchor="middle" class="label">Kafka</text>
  <text x="370" y="236" text-anchor="middle" class="topic">events.raw</text>

  <rect x="500" y="170" width="200" height="100" class="box"/>
  <text x="600" y="210" text-anchor="middle" class="label">Analytics</text>
  <text x="600" y="236" text-anchor="middle" class="small">risk scoring</text>

  <rect x="750" y="170" width="180" height="100" class="box"/>
  <text x="840" y="210" text-anchor="middle" class="label">Kafka</text>
  <text x="840" y="236" text-anchor="middle" class="topic">events.processed</text>

  <rect x="960" y="170" width="180" height="100" class="box"/>
  <text x="1050" y="210" text-anchor="middle" class="label">Alert Service</text>
  <text x="1050" y="236" text-anchor="middle" class="small">alerts + DB write</text>

  <rect x="860" y="390" width="220" height="110" class="box"/>
  <text x="970" y="432" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="970" y="458" text-anchor="middle" class="small">alerts table</text>

  <path d="M 240 220 L 280 220" class="arrow"/>
  <path d="M 460 220 L 500 220" class="arrow"/>
  <path d="M 700 220 L 750 220" class="arrow"/>
  <path d="M 930 220 L 960 220" class="arrow"/>
  <path d="M 1050 270 L 1050 390" class="arrow"/>

  <rect x="60" y="360" width="700" height="170" class="box"/>
  <text x="90" y="404" class="label">Validation Snapshot</text>
  <text x="90" y="438" class="small">1. POST /events accepted a high-risk transaction</text>
  <text x="90" y="468" class="small">2. Analytics published the processed event with risk_score = 90</text>
  <text x="90" y="498" class="small">3. Alert Service generated an alert and stored it in PostgreSQL</text>
</svg>