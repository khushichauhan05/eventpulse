services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: eventpulse

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ml-service:
    build:
      context: .
      dockerfile: services/ml-service/Dockerfile

    container_name: ml-service
    restart: unless-stopped

    environment:
      REDIS_URL: redis://redis:6379

    ports:
      - "8000:8000"

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile

    container_name: api-gateway
    restart: unless-stopped

    environment:
      SERVICE_NAME: api-gateway
      PORT: ${API_PORT:-8080}
      DATABASE_DSN: ${DATABASE_DSN:-host=postgres port=5432 user=admin password=admin123 dbname=eventpulse sslmode=disable}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-events.raw}
      KAFKA_TOPIC_PROCESSED: ${KAFKA_TOPIC_PROCESSED:-events.processed}
      KAFKA_TOPIC_ALERTS: ${KAFKA_TOPIC_ALERTS:-alerts}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-events.dlq}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    ports:
      - "8080:8080"

    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile

    container_name: analytics-service
    restart: unless-stopped

    environment:
      SERVICE_NAME: analytics-service
      HEALTH_PORT: ${ANALYTICS_HEALTH_PORT:-8081}
      DATABASE_DSN: ${DATABASE_DSN:-host=postgres port=5432 user=admin password=admin123 dbname=eventpulse sslmode=disable}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-events.raw}
      KAFKA_TOPIC_PROCESSED: ${KAFKA_TOPIC_PROCESSED:-events.processed}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-events.dlq}
      KAFKA_ANALYTICS_GROUP: ${KAFKA_ANALYTICS_GROUP:-analytics-group}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    ports:
      - "8081:8081"

    depends_on:
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile

    container_name: alert-service
    restart: unless-stopped

    environment:
      SERVICE_NAME: alert-service
      HEALTH_PORT: ${ALERT_HEALTH_PORT:-8082}
      DATABASE_DSN: ${DATABASE_DSN:-host=postgres port=5432 user=admin password=admin123 dbname=eventpulse sslmode=disable}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC_PROCESSED: ${KAFKA_TOPIC_PROCESSED:-events.processed}
      KAFKA_TOPIC_ALERTS: ${KAFKA_TOPIC_ALERTS:-alerts}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-events.dlq}
      KAFKA_ALERT_GROUP: ${KAFKA_ALERT_GROUP:-alert-group}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    ports:
      - "8082:8082"

    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile

    container_name: dashboard
    restart: unless-stopped
    ports:
      - "3001:80"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    ports:
      - "9090:9090"

    depends_on:
      - api-gateway
      - analytics-service
      - alert-service
      - ml-service

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
